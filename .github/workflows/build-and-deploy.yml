name: Build and Deploy

on:
  repository_dispatch:
    types: [source-updated]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout mantang source
        uses: actions/checkout@v4
        with:
          repository: mmantang/mantang
          ref: develop
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build -- --mode staging
        env:
          VITE_NAVER_LOGIN_CLIENT_ID: ${{ secrets.VITE_NAVER_LOGIN_CLIENT_ID }}                                                                                                                      
          VITE_NAVER_MAP_CLIENT_ID: ${{ secrets.VITE_NAVER_MAP_CLIENT_ID }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          VITE_OPINET_KEY: ${{ secrets.VITE_OPINET_KEY }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}
          VITE_KAKAO_MOBILITY_KEY: ${{ secrets.VITE_KAKAO_MOBILITY_KEY }}
          VITE_BASE_PATH: /mantang-develop/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
